{% extends "base.html" %}
{% block title %}Login — PhishGuard AI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <span class="auth-icon">🛡️</span>
            <h2>Welcome Back</h2>
            <p>Sign in to your PhishGuard AI account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span>Sign In</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
